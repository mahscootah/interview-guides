<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  /* Header */
  .app-header { background: #1a1a2e; padding: 14px 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .app-header img { height: 28px; filter: brightness(0) invert(1); }
  .app-header h1 { color: #fff; font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  .app-header span { color: #8892a4; font-size: 14px; margin-left: auto; }

  /* Progress bar */
  .progress-bar { background: #fff; border-bottom: 1px solid #e2e6ea; padding: 0 20px; display: flex; gap: 0; }
  .step-tab { padding: 16px 24px; font-size: 13px; font-weight: 500; color: #8892a4; border-bottom: 3px solid transparent; cursor: default; display: flex; align-items: center; gap: 8px; transition: all 0.2s; white-space: nowrap; }
  .step-tab .step-num { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #d1d5db; color: #9ca3af; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; transition: all 0.2s; }
  .step-tab.active { color: #1a1a2e; border-bottom-color: #e05c2a; }
  .step-tab.active .step-num { background: #e05c2a; border-color: #e05c2a; color: #fff; }
  .step-tab.done { color: #16a34a; cursor: pointer; }
  .step-tab.done .step-num { background: #16a34a; border-color: #16a34a; color: #fff; }
  .step-tab.done:hover { color: #15803d; }

  /* Main content */
  .main { max-width: 780px; margin: 24px auto; padding: 0 16px 48px; }

  /* Cards */
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04); padding: 24px; margin-bottom: 24px; }
  .card-title { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
  .card-subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }

  /* Form elements */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
  label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  input[type="text"], input[type="date"], select, textarea {
    width: 100%; padding: 10px 14px; border: 1.5px solid #e2e6ea; border-radius: 8px;
    font-size: 14px; color: #1a1a2e; background: #fff; outline: none; transition: border-color 0.2s;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: #e05c2a; box-shadow: 0 0 0 3px rgba(224,92,42,0.1); }
  input::placeholder { color: #9ca3af; }

  /* Interview type selector */
  .type-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .type-card { border: 2px solid #e2e6ea; border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; }
  .type-card:hover { border-color: #e05c2a; background: #fff8f5; }
  .type-card.selected { border-color: #e05c2a; background: #fff8f5; }
  .type-card .type-icon { font-size: 28px; margin-bottom: 10px; }
  .type-card .type-name { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .type-card .type-desc { font-size: 12px; color: #6b7280; line-height: 1.5; }
  .type-card .check { position: absolute; top: 12px; right: 12px; width: 20px; height: 20px; border-radius: 50%; background: #e05c2a; display: none; align-items: center; justify-content: center; }
  .type-card.selected .check { display: flex; }
  .type-card .check::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

  /* Interviewer inputs */
  .interviewer-list { display: flex; flex-direction: column; gap: 10px; }
  .interviewer-row { display: flex; gap: 10px; align-items: center; }
  .interviewer-row input { flex: 1; }
  .btn-remove { background: none; border: 1.5px solid #fca5a5; color: #ef4444; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 18px; line-height: 1; transition: all 0.2s; }
  .btn-remove:hover { background: #fee2e2; }
  .btn-add { background: none; border: 1.5px dashed #d1d5db; color: #6b7280; padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; width: 100%; margin-top: 6px; }
  .btn-add:hover { border-color: #e05c2a; color: #e05c2a; background: #fff8f5; }

  /* Competency section */
  .comp-group { margin-bottom: 32px; }
  .comp-group-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #f0f2f5; }
  .comp-group-label { font-size: 16px; font-weight: 700; color: #1a1a2e; }
  .comp-badge { background: #e05c2a; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .comp-badge.blue { background: #2563eb; }
  .comp-count { margin-left: auto; font-size: 12px; color: #6b7280; }
  .comp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .comp-chip { border: 1.5px solid #e2e6ea; border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; background: #fff; }
  .comp-chip:hover { border-color: #e05c2a; background: #fff8f5; }
  .comp-chip.selected { border-color: #e05c2a; background: #fff8f5; }
  .comp-chip.selected-blue { border-color: #2563eb; background: #eff6ff; }
  .comp-chip:hover.selected-blue { border-color: #2563eb; }
  .comp-chip .chip-name { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .comp-chip .chip-check { width: 16px; height: 16px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: #fff; flex-shrink: 0; margin-left: auto; }
  .comp-chip.selected .chip-check { display: flex; background: #e05c2a; }
  .comp-chip.selected-blue .chip-check { display: flex; background: #2563eb; }
  .comp-chip .chip-def { font-size: 11px; color: #6b7280; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* Question review */
  .q-item { border: 1.5px solid #e2e6ea; border-radius: 12px; padding: 20px; margin-bottom: 16px; transition: border-color 0.2s; }
  .q-item:hover { border-color: #cbd5e1; }
  .q-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .q-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .q-badge.leadership { background: #fff1ec; color: #e05c2a; }
  .q-badge.behavioral { background: #eff6ff; color: #2563eb; }
  .q-competency { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .q-definition { font-size: 12px; color: #6b7280; margin-top: 2px; line-height: 1.4; }
  .q-panelist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .q-panelist-label { font-size: 12px; font-weight: 600; color: #374151; white-space: nowrap; }
  .q-panelist-select { flex: 1; font-size: 13px; padding: 7px 10px; }
  .q-question-label { font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .q-question-label a { color: #6b7280; font-weight: 400; font-size: 11px; cursor: pointer; text-decoration: underline; }
  .q-question-label a:hover { color: #e05c2a; }
  .q-select { width: 100%; font-size: 13px; padding: 10px 12px; border: 1.5px solid #e2e6ea; border-radius: 8px; background: #f9fafb; color: #1a1a2e; cursor: pointer; }
  .q-select:focus { border-color: #e05c2a; background: #fff; outline: none; box-shadow: 0 0 0 3px rgba(224,92,42,0.1); }

  /* Buttons */
  .btn-primary { background: #e05c2a; color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary:hover { background: #c94f20; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(224,92,42,0.3); }
  .btn-primary:disabled { background: #d1d5db; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: #fff; color: #374151; border: 1.5px solid #e2e6ea; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-secondary:hover { border-color: #9ca3af; background: #f9fafb; }
  .btn-row { display: flex; gap: 12px; justify-content: space-between; align-items: center; margin-top: 28px; }

  /* Summary */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .summary-item { background: #f9fafb; border-radius: 8px; padding: 14px 16px; }
  .summary-item .label { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .summary-item .value { font-size: 14px; font-weight: 600; color: #1a1a2e; }
  .summary-comps { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .summary-comp-tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .summary-comp-tag.l { background: #fff1ec; color: #e05c2a; }
  .summary-comp-tag.b { background: #eff6ff; color: #2563eb; }

  /* Selection counter */
  .sel-counter { display: flex; gap: 16px; margin-bottom: 16px; }
  .sel-count { background: #f0f2f5; border-radius: 8px; padding: 8px 16px; font-size: 13px; color: #6b7280; }
  .sel-count strong { color: #1a1a2e; }
  .sel-hint { background: #fef3c7; border-radius: 8px; padding: 8px 16px; font-size: 13px; color: #92400e; display: none; }
  .sel-hint.show { display: block; }

  /* Alert */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
  .alert-warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
  .alert-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }

  /* Generate step */
  .generate-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  .generate-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 8px; }
  .generate-sub { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 28px; }
  .divider { height: 1px; background: #f0f2f5; margin: 24px 0; }

  /* Tooltip */
  .tooltip-wrap { position: relative; display: inline-flex; }
  .tooltip-icon { width: 16px; height: 16px; border-radius: 50%; background: #e2e6ea; color: #6b7280; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; cursor: help; margin-left: 4px; }

  /* Loading spinner */
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .form-row { grid-template-columns: 1fr; }

  }

async function getBrandLogoBuffer(brand) {
  const cfg = BRAND_CONFIG[brand] || BRAND_CONFIG.csc;
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 520, maxH = 100;
      let w = img.naturalWidth || 300;
      let h = img.naturalHeight || 80;
      const scale = Math.min(maxW / w, maxH / h);
      w = Math.round(w * scale);
      h = Math.round(h * scale);
      const canvas = document.createElement('canvas');
      canvas.width = maxW;
      canvas.height = maxH;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, maxW, maxH);
      const y = Math.round((maxH - h) / 2);
      ctx.drawImage(img, 0, y, w, h);
      canvas.toBlob(blob => blob.arrayBuffer().then(resolve), 'image/png');
    };
    img.onerror = () => reject(new Error('Logo load failed'));
    img.src = 'data:image/svg+xml;base64,' + cfg.svg;
  });
}

// ─── DERIVED DATA ─────────────────────────────────────────────────────────────
const LEADERSHIP = [...new Set(QBANK.filter(q=>q.group==='Leadership Capabilities').map(q=>q.competency))].sort();
const BEHAVIORAL = [...new Set(QBANK.filter(q=>q.group==='Behavioral Skills').map(q=>q.competency))].sort();

function getQuestions(competency) {
  return QBANK.filter(q => q.competency === competency);
}
function getDefinition(competency) {
  const q = QBANK.find(q => q.competency === competency);
  return q ? q.definition : '';
}
function getGroup(competency) {
  const q = QBANK.find(q => q.competency === competency);
  return q ? q.group : '';
}

// ─── STEP NAVIGATION ─────────────────────────────────────────────────────────
function goToStep(n) {
  if (n < state.step || canProceed(n-1)) {
    state.step = n;
    render();
  }
}
function canProceed(fromStep) {
  if (fromStep === 1) return state.interviewType && state.jobTitle.trim() && state.hiringManager.trim();
  if (fromStep === 2) return state.selectedComps.length > 0;
  if (fromStep === 3) return true;
  return false;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderProgress();
  const main = document.getElementById('mainContent');
  if (state.step === 1) main.innerHTML = renderStep1();
  if (state.step === 2) main.innerHTML = renderStep2();
  if (state.step === 3) main.innerHTML = renderStep3();
  if (state.step === 4) main.innerHTML = renderStep4();
  attachEvents();
}

function renderProgress() {
  const steps = [
    { n: 1, label: 'Setup' },
    { n: 2, label: 'Competencies' },
    { n: 3, label: 'Questions' },
    { n: 4, label: 'Generate' }
  ];
  document.getElementById('progressBar').innerHTML = steps.map(s => {
    let cls = s.n === state.step ? 'active' : s.n < state.step ? 'done' : '';
    return `<div class="step-tab ${cls}" onclick="goToStep(${s.n})">
      <div class="step-num">${s.n < state.step ? '✓' : s.n}</div>
      ${s.label}
    </div>`;
  }).join('');
}

// ─── STEP 1: SETUP ────────────────────────────────────────────────────────────
function renderStep1() {
  const hm = state.interviewType === 'hm' ? 'selected' : '';
  const panel = state.interviewType === 'panel' ? 'selected' : '';
  const interviewerRows = state.interviewers.map((name, i) => `
    <div class="interviewer-row">
      <input type="text" placeholder="Interviewer name" value="${esc(name)}" 
        oninput="state.interviewers[${i}] = this.value" />
      ${state.interviewers.length > 1 
        ? `<button class="btn-remove" onclick="removeInterviewer(${i})">×</button>` 
        : ''}
    </div>`).join('');

  const canNext = canProceed(1);

  return `
  <div class="card">
    <div class="card-title">Interview Setup</div>
    <div class="card-subtitle">Configure the type and details for this interview guide.</div>

    <label style="margin-bottom:10px">Interview Type</label>
    <div class="type-cards">
      <div class="type-card ${hm}" onclick="selectType('hm')">
        <div class="check"></div>
        <div class="type-icon">👤</div>
        <div class="type-name">Hiring Manager Interview</div>
        <div class="type-desc">One-on-one interview led by the hiring manager. All questions are assigned to a single interviewer.</div>
      </div>
      <div class="type-card ${panel}" onclick="selectType('panel')">
        <div class="check"></div>
        <div class="type-icon">👥</div>
        <div class="type-name">Panel Interview</div>
        <div class="type-desc">Multiple interviewers on the panel. Each competency can be assigned to a specific panelist.</div>
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>Job Title *</label>
        <input type="text" placeholder="e.g. Senior Product Manager" value="${esc(state.jobTitle)}"
          oninput="state.jobTitle = this.value; checkNext()" />
      </div>
      <div>
        <label>Interview Date</label>
        <input type="date" value="${state.interviewDate}" oninput="state.interviewDate = this.value" />
      </div>
    </div>

    <div class="form-row single">
      <div>
        <label>Hiring Manager Name *</label>
        <input type="text" placeholder="Full name" value="${esc(state.hiringManager)}"
          oninput="state.hiringManager = this.value; checkNext()" />
      </div>
    </div>

    <div class="form-row single">
      <div>
        <label>Brand</label>
        <select oninput="state.brand = this.value" style="width:100%;padding:10px 14px;border:1.5px solid #e2e6ea;border-radius:8px;font-size:14px;color:#1a1a2e;background:#fff;">
          <option value="csc"      ${state.brand==='csc'      ? 'selected' : ''}>Columbia Sportswear Company</option>
          <option value="columbia" ${state.brand==='columbia' ? 'selected' : ''}>Columbia</option>
          <option value="sorel"    ${state.brand==='sorel'    ? 'selected' : ''}>Sorel</option>
          <option value="mhw"      ${state.brand==='mhw'      ? 'selected' : ''}>Mountain Hardwear</option>
          <option value="prana"    ${state.brand==='prana'    ? 'selected' : ''}>prAna</option>
        </select>
      </div>
    </div>

    ${state.interviewType === 'panel' ? `
    <label style="margin-bottom:8px">Panelist Names</label>
    <div class="interviewer-list" id="interviewerList">
      ${interviewerRows}
    </div>
    <button class="btn-add" onclick="addInterviewer()">+ Add Panelist</button>
    ` : state.interviewType === 'hm' ? `
    <div class="form-row single">
      <div>
        <label>Interviewer Name</label>
        <input type="text" placeholder="Full name (if different from hiring manager)" value="${esc(state.interviewers[0] || '')}"
          oninput="state.interviewers[0] = this.value" />
      </div>
    </div>
    ` : ''}

    <div class="btn-row">
      <div></div>
      <button class="btn-primary" id="step1next" onclick="proceedTo2()" ${canNext?'':'disabled'}>
        Next: Select Competencies →
      </button>
    </div>
  </div>`;
}

function selectType(t) {
  state.interviewType = t;
  if (t === 'hm') state.interviewers = [state.interviewers[0] || ''];
  render();
}
function addInterviewer() {
  state.interviewers.push('');
  render();
}
function removeInterviewer(i) {
  state.interviewers.splice(i, 1);
  // Remove panelist from any assignments
  Object.keys(state.assignments).forEach(k => {
    if (state.assignments[k].panelistIdx >= state.interviewers.length)
      state.assignments[k].panelistIdx = 0;
  });
  render();
}
function checkNext() {
  const btn = document.getElementById('step1next');
  if (btn) btn.disabled = !canProceed(1);
}
function proceedTo2() {
  if (!canProceed(1)) return;
  state.step = 2;
  render();
}

// ─── STEP 2: COMPETENCIES ─────────────────────────────────────────────────────
function renderStep2() {
  const lCount = state.selectedComps.filter(c => LEADERSHIP.includes(c)).length;
  const bCount = state.selectedComps.filter(c => BEHAVIORAL.includes(c)).length;

  const leadershipChips = LEADERSHIP.map(c => {
    const sel = state.selectedComps.includes(c);
    return `<div class="comp-chip ${sel?'selected':''}" onclick="toggleComp('${esc(c)}')">
      <div class="chip-name">${esc(c)} <div class="chip-check">✓</div></div>
      <div class="chip-def">${esc(getDefinition(c))}</div>
    </div>`;
  }).join('');

  const behavioralChips = BEHAVIORAL.map(c => {
    const sel = state.selectedComps.includes(c);
    return `<div class="comp-chip ${sel?'selected-blue':''}" onclick="toggleComp('${esc(c)}')">
      <div class="chip-name">${esc(c)} <div class="chip-check">✓</div></div>
      <div class="chip-def">${esc(getDefinition(c))}</div>
    </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="card-title">Select Competencies</div>
    <div class="card-subtitle">Choose the competencies to assess in this interview. Typically 4–8 competencies per guide.</div>

    <div class="sel-counter">
      <div class="sel-count"><strong>${lCount}</strong> Leadership selected</div>
      <div class="sel-count"><strong>${bCount}</strong> Behavioral selected</div>
      <div class="sel-count"><strong>${state.selectedComps.length}</strong> total</div>
    </div>

    <div class="comp-group">
      <div class="comp-group-header">
        <span class="comp-group-label">Leadership Capabilities</span>
        <span class="comp-badge">${lCount > 0 ? lCount + ' selected' : LEADERSHIP.length + ' available'}</span>
        <span class="comp-count" style="margin-left:auto"></span>
      </div>
      <div class="comp-grid">${leadershipChips}</div>
    </div>

    <div class="comp-group">
      <div class="comp-group-header">
        <span class="comp-group-label">Behavioral Skills</span>
        <span class="comp-badge blue">${bCount > 0 ? bCount + ' selected' : BEHAVIORAL.length + ' available'}</span>
      </div>
      <div class="comp-grid">${behavioralChips}</div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="state.step=1;render()">← Back</button>
      <button class="btn-primary" onclick="proceedTo3()" ${state.selectedComps.length>0?'':'disabled'}>
        Next: Review Questions →
      </button>
    </div>
  </div>`;
}

function toggleComp(c) {
  const idx = state.selectedComps.indexOf(c);
  if (idx === -1) {
    state.selectedComps.push(c);
    // Auto-assign first question and first panelist
    state.assignments[c] = { questionIdx: 0, panelistIdx: 0 };
  } else {
    state.selectedComps.splice(idx, 1);
    delete state.assignments[c];
  }
  render();
}

function proceedTo3() {
  if (state.selectedComps.length === 0) return;
  state.step = 3;
  render();
}

// ─── STEP 3: QUESTIONS ────────────────────────────────────────────────────────
function renderStep3() {
  const panelists = state.interviewers.filter(p => p.trim());
  const hasPanelists = panelists.length > 0;
  const isPanel = state.interviewType === 'panel';

  const items = state.selectedComps.map((comp, idx) => {
    const group = getGroup(comp);
    const isLeadership = group === 'Leadership Capabilities';
    const badgeCls = isLeadership ? 'leadership' : 'behavioral';
    const badgeLabel = isLeadership ? 'Leadership' : 'Behavioral';
    const def = getDefinition(comp);
    const questions = getQuestions(comp);
    const asgn = state.assignments[comp] || { questionIdx: 0, panelistIdx: 0 };
    
    const questionOptions = questions.map((q, qi) => 
      `<option value="${qi}" ${qi===asgn.questionIdx?'selected':''}>${esc(q.question)}</option>`
    ).join('');

    const panelistRow = isPanel && hasPanelists ? `
      <div class="q-panelist-row">
        <span class="q-panelist-label">Assign to panelist:</span>
        <select class="q-panelist-select" onchange="updatePanelist('${esc(comp)}', parseInt(this.value))">
          ${panelists.map((p,pi) => `<option value="${pi}" ${pi===asgn.panelistIdx?'selected':''}>${esc(p)}</option>`).join('')}
        </select>
      </div>` : '';

    return `
    <div class="q-item">
      <div class="q-header">
        <span class="q-badge ${badgeCls}">${badgeLabel}</span>
        <div>
          <div class="q-competency">${esc(comp)}</div>
          <div class="q-definition">${esc(def)}</div>
        </div>
      </div>
      ${panelistRow}
      <div class="q-question-label">
        Interview Question
        <a onclick="rotateQuestion('${esc(comp)}')">↻ Use a different question</a>
      </div>
      <select class="q-select" onchange="updateQuestion('${esc(comp)}', parseInt(this.value))">
        ${questionOptions}
      </select>
    </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="card-title">Review Questions</div>
    <div class="card-subtitle">
      A question has been auto-selected for each competency. Use the dropdown to choose a different question, 
      ${state.interviewType === 'panel' ? 'and assign each question to a panelist.' : 'or click ↻ to cycle through options.'}
    </div>
    ${items}
    <div class="btn-row">
      <button class="btn-secondary" onclick="state.step=2;render()">← Back</button>
      <button class="btn-primary" onclick="state.step=4;render()">
        Review & Generate →
      </button>
    </div>
  </div>`;
}

function updateQuestion(comp, idx) {
  if (!state.assignments[comp]) state.assignments[comp] = { questionIdx: 0, panelistIdx: 0 };
  state.assignments[comp].questionIdx = idx;
}
function updatePanelist(comp, idx) {
  if (!state.assignments[comp]) state.assignments[comp] = { questionIdx: 0, panelistIdx: 0 };
  state.assignments[comp].panelistIdx = idx;
}
function rotateQuestion(comp) {
  const questions = getQuestions(comp);
  const asgn = state.assignments[comp] || { questionIdx: 0, panelistIdx: 0 };
  asgn.questionIdx = (asgn.questionIdx + 1) % questions.length;
  state.assignments[comp] = asgn;
  render();
}

// ─── STEP 4: GENERATE ─────────────────────────────────────────────────────────
function renderStep4() {
  const panelists = state.interviewers.filter(p => p.trim());
  const dateStr = state.interviewDate 
    ? new Date(state.interviewDate + 'T12:00:00').toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'})
    : 'Not specified';

  const compSummary = state.selectedComps.map(c => {
    const group = getGroup(c);
    const isL = group === 'Leadership Capabilities';
    return `<span class="summary-comp-tag ${isL?'l':'b'}">${esc(c)}</span>`;
  }).join('');

  const panelistStr = panelists.length ? panelists.join(', ') : state.hiringManager;

  return `
  <div class="card" style="text-align:left">
    <div class="generate-icon">📋</div>
    <div class="generate-title">Ready to Generate</div>
    <div class="generate-sub">Review your selections below, then download your interview guide.</div>

    <div class="summary-grid">
      <div class="summary-item">
        <div class="label">Interview Type</div>
        <div class="value">${state.interviewType === 'hm' ? '👤 Hiring Manager Interview' : '👥 Panel Interview'}</div>
      </div>
      <div class="summary-item">
        <div class="label">Job Title</div>
        <div class="value">${esc(state.jobTitle)}</div>
      </div>
      <div class="summary-item">
        <div class="label">Hiring Manager</div>
        <div class="value">${esc(state.hiringManager)}</div>
      </div>
      <div class="summary-item">
        <div class="label">Interview Date</div>
        <div class="value">${dateStr}</div>
      </div>
      ${state.interviewType === 'panel' ? `
      <div class="summary-item" style="grid-column:1/-1">
        <div class="label">Panelists</div>
        <div class="value">${esc(panelistStr)}</div>
      </div>` : ''}
    </div>

    <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:10px">${state.selectedComps.length} Competencies Selected</div>
    <div class="summary-comps">${compSummary}</div>

    <div class="divider"></div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="state.step=3;render()">← Edit Questions</button>
      <button class="btn-primary" id="generateBtn" onclick="generateDoc()">
        <span id="generateBtnText">⬇ Download Interview Guide (.docx)</span>
      </button>
    </div>
  </div>`;
}

// ─── WORD DOC GENERATION ──────────────────────────────────────────────────────
async function generateDoc() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  document.getElementById('generateBtnText').innerHTML = '<div class="spinner"></div> Generating...';

  try {
    await buildDocx();
  } catch(err) {
    console.error(err);
    alert('Error generating document: ' + err.message + '\n\nPlease ensure you have an internet connection (needed for the document library).');
  }
  
  btn.disabled = false;
  document.getElementById('generateBtnText').innerHTML = '⬇ Download Interview Guide (.docx)';
}

async function buildDocx() {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign,
    HeadingLevel, ImageRun, Header, Footer, PageNumber, TableLayoutType,
    WidthType: WT } = window.docx;

  const panelists = state.interviewers.filter(p => p.trim());
  const isPanel = state.interviewType === 'panel';
  const facilitatorName = panelists.length > 0 ? panelists[0] : state.hiringManager;
  const allPanelistStr = panelists.length ? panelists.join(', ') : state.hiringManager;
  const interviewerLabel = isPanel ? allPanelistStr : (panelists[0] || state.hiringManager);

  const dateStr = state.interviewDate 
    ? new Date(state.interviewDate + 'T12:00:00').toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'})
    : '';

  // Fetch brand logo
  let logoData = null;
  try {
    logoData = await getBrandLogoBuffer(state.brand || 'csc');
  } catch(e) { /* skip logo if unavailable */ }

  // ── Helpers ───────────────────────────────────────────────────────────────
  const cellBorder = { style: BorderStyle.SINGLE, size: 4, color: "CCCCCC" };
  const allBorders = { top: cellBorder, bottom: cellBorder, left: cellBorder, right: cellBorder };
  const noBorder = { style: BorderStyle.NONE, size: 0, color: "FFFFFF" };
  const noBorders = { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder };

  function para(text, opts = {}) {
    return new Paragraph({
      children: [new TextRun({ text, font: 'Arial', size: opts.size || 20, bold: opts.bold, color: opts.color, italics: opts.italic })],
      spacing: { before: opts.before || 0, after: opts.after || 80 },
      alignment: opts.align || AlignmentType.LEFT,
    });
  }
  function emptyPara() { return new Paragraph({ children: [new TextRun({ text: '', font: 'Arial', size: 20 })], spacing: { after: 40 } }); }
  function headerPara(text) {
    return new Paragraph({
      children: [new TextRun({ text, font: 'Arial', size: 24, bold: true, color: '1A1A2E' })],
      spacing: { before: 120, after: 80 },
      border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: 'E05C2A', space: 2 } }
    });
  }
  function boldPara(text, opts = {}) {
    const parts = [];
    // Support bold+normal mixed inline using **text**
    const segments = text.split(/(\*\*[^*]+\*\*)/);
    segments.forEach(seg => {
      if (seg.startsWith('**') && seg.endsWith('**')) {
        parts.push(new TextRun({ text: seg.slice(2,-2), font: 'Arial', size: opts.size||20, bold: true }));
      } else if (seg) {
        parts.push(new TextRun({ text: seg, font: 'Arial', size: opts.size||20, italic: opts.italic }));
      }
    });
    return new Paragraph({ children: parts, spacing: { before: opts.before||0, after: opts.after||80 }, indent: opts.indent ? { left: opts.indent } : undefined });
  }
  function cell(children, opts = {}) {
    return new TableCell({
      children,
      borders: opts.borders || allBorders,
      width: opts.width ? { size: opts.width, type: WidthType.DXA } : undefined,
      shading: opts.shade ? { fill: opts.shade, type: ShadingType.CLEAR } : undefined,
      verticalAlign: VerticalAlign.TOP,
      columnSpan: opts.span || 1,
      margins: { top: 100, bottom: 100, left: 120, right: 120 }
    });
  }

  // ── Score table ──────────────────────────────────────────────────────────
  const scoreDefs = [
    ['1\nEmerging', 'The candidate is actively building the skill and beginning to practice behaviors on the job.'],
    ['2\nSkilled', 'The candidate has the basics down and consistently demonstrates the skills and behaviors required for the role.'],
    ['3\nHighly Skilled', 'Candidate has skills beyond what is expected of the role, consistently role models behaviors, and coaches others to increase their capability level.'],
    ['4\nAdvanced', 'Candidate broadly applies skills beyond the role to improve business functions and achieve enterprise results.']
  ];
  const scoreHeaderCells = scoreDefs.map(([label]) => cell([
    new Paragraph({ children: [new TextRun({ text: label.split('\n')[0], font:'Arial', size:20, bold:true, color:'FFFFFF' }), new TextRun({ text: '\n', font:'Arial', size:20 }), new TextRun({ text: label.split('\n')[1], font:'Arial', size:18, color:'FFFFFF' })], spacing:{after:0} })
  ], { shade: '1A1A2E', width: 2340 }));
  const scoreDefCells = scoreDefs.map(([,def]) => cell([para(def, {size:18})], { width: 2340 }));
  const scoreTable = new Table({
    width: { size: 9360, type: WidthType.DXA },
    columnWidths: [2340, 2340, 2340, 2340],
    rows: [
      new TableRow({ children: scoreHeaderCells }),
      new TableRow({ children: scoreDefCells })
    ]
  });

  // ── Interview questions table ─────────────────────────────────────────────
  // Columns: Competency (2200) | Panelist (1800) | Question (3200) | Notes (2160) = 9360
  const COL_WIDTHS = isPanel ? [2000, 1800, 3360, 2200] : [2200, 0, 3600, 3560];
  const colWidths = isPanel ? [2000, 1800, 3360, 2200] : [2400, 3760, 3200];

  const qHeaderCells = isPanel 
    ? [
        cell([para('Competency', {bold:true, color:'FFFFFF', size:18})], {shade:'1A1A2E', width:2000}),
        cell([para('Panelist', {bold:true, color:'FFFFFF', size:18})], {shade:'1A1A2E', width:1800}),
        cell([para('Question', {bold:true, color:'FFFFFF', size:18})], {shade:'1A1A2E', width:3360}),
        cell([para('Notes', {bold:true, color:'FFFFFF', size:18})], {shade:'1A1A2E', width:2200}),
      ]
    : [
        cell([para('Competency', {bold:true, color:'FFFFFF', size:18})], {shade:'1A1A2E', width:2400}),
        cell([para('Question', {bold:true, color:'FFFFFF', size:18})], {shade:'1A1A2E', width:3760}),
        cell([para('Notes', {bold:true, color:'FFFFFF', size:18})], {shade:'1A1A2E', width:3200}),
      ];

  const questionRows = [];
  questionRows.push(new TableRow({ children: qHeaderCells }));

  state.selectedComps.forEach((comp, ci) => {
    const asgn = state.assignments[comp] || {questionIdx:0, panelistIdx:0};
    const qs = getQuestions(comp);
    const q = qs[asgn.questionIdx] || qs[0];
    const group = getGroup(comp);
    const isL = group === 'Leadership Capabilities';
    const panelistName = isPanel 
      ? (panelists[asgn.panelistIdx] || panelists[0] || state.hiringManager)
      : (panelists[0] || state.hiringManager);
    const rowShade = ci % 2 === 0 ? 'F9FAFB' : 'FFFFFF';

    // Notes cells (3 blank rows merged concept: just 3 note lines)
    const noteChildren = [
      para('', {size:18}),
      para('', {size:18}),
      para('', {size:18}),
    ];

    // Competency cell with colored top border
    const compCell = new TableCell({
      children: [
        new Paragraph({ children: [new TextRun({ text: comp, font:'Arial', size:20, bold:true })], spacing:{after:60} }),
        new Paragraph({ children: [new TextRun({ text: isL ? 'Leadership' : 'Behavioral', font:'Arial', size:16, color: isL ? 'E05C2A' : '2563EB', bold:true })], spacing:{after:0} })
      ],
      borders: allBorders,
      width: { size: isPanel ? 2000 : 2400, type: WidthType.DXA },
      shading: { fill: rowShade, type: ShadingType.CLEAR },
      verticalAlign: VerticalAlign.TOP,
      margins: { top: 120, bottom: 120, left: 120, right: 120 }
    });

    const questionCell = new TableCell({
      children: [new Paragraph({ children: [new TextRun({ text: q ? q.question : '', font:'Arial', size:20 })], spacing:{after:0} })],
      borders: allBorders,
      width: { size: isPanel ? 3360 : 3760, type: WidthType.DXA },
      shading: { fill: rowShade, type: ShadingType.CLEAR },
      verticalAlign: VerticalAlign.TOP,
      margins: { top: 120, bottom: 120, left: 120, right: 120 }
    });

    const notesCell = new TableCell({
      children: noteChildren,
      borders: allBorders,
      width: { size: isPanel ? 2200 : 3200, type: WidthType.DXA },
      shading: { fill: rowShade, type: ShadingType.CLEAR },
      verticalAlign: VerticalAlign.TOP,
      margins: { top: 120, bottom: 120, left: 120, right: 120 }
    });

    if (isPanel) {
      const panelistCell = new TableCell({
        children: [new Paragraph({ children: [new TextRun({ text: panelistName, font:'Arial', size:20 })], spacing:{after:0} })],
        borders: allBorders,
        width: { size: 1800, type: WidthType.DXA },
        shading: { fill: rowShade, type: ShadingType.CLEAR },
        verticalAlign: VerticalAlign.TOP,
        margins: { top: 120, bottom: 120, left: 120, right: 120 }
      });
      questionRows.push(new TableRow({ children: [compCell, panelistCell, questionCell, notesCell] }));
    } else {
      questionRows.push(new TableRow({ children: [compCell, questionCell, notesCell] }));
    }

    // Score row (spanning all columns)
    const scoreLabelCell = new TableCell({
      children: [new Paragraph({ children: [
        new TextRun({ text: 'Score: ', font:'Arial', size:18, bold:true }),
        new TextRun({ text: '  1 – Emerging    2 – Skilled    3 – Highly Skilled    4 – Advanced', font:'Arial', size:18, color:'6B7280' })
      ], spacing:{after:0}})],
      borders: { top: noBorder, bottom: cellBorder, left: cellBorder, right: cellBorder },
      columnSpan: isPanel ? 4 : 3,
      shading: { fill: 'F3F4F6', type: ShadingType.CLEAR },
      margins: { top: 80, bottom: 80, left: 120, right: 120 }
    });
    questionRows.push(new TableRow({ children: [scoreLabelCell] }));
  });

  const questionsTable = new Table({
    width: { size: 9360, type: WidthType.DXA },
    columnWidths: isPanel ? [2000, 1800, 3360, 2200] : [2400, 3760, 3200],
    rows: questionRows
  });

  // ── Build doc ─────────────────────────────────────────────────────────────
  const children = [];

  // Logo
  if (logoData) {
    children.push(new Paragraph({
      children: [new ImageRun({ type: 'png', data: logoData, transformation: { width: 140, height: 35 }, altText: { title: 'Logo', description: 'Company Logo', name: 'Logo' } })],
      spacing: { after: 100 }
    }));
  }

  // Title
  children.push(new Paragraph({
    children: [new TextRun({ text: `INTERVIEW GUIDE – ${state.jobTitle.toUpperCase()}`, font:'Arial', size:32, bold:true, color:'1A1A2E' })],
    spacing: { before: 80, after: 60 },
    border: { bottom: { style: BorderStyle.SINGLE, size: 8, color: 'E05C2A', space: 2 } }
  }));

  if (dateStr) {
    children.push(para(`Interview Date: ${dateStr}`, {size:18, color:'6B7280', before:80, after:200}));
  } else {
    children.push(emptyPara());
  }

  // Agenda
  children.push(headerPara('Agenda'));
  children.push(boldPara(`**${facilitatorName}** — you have been selected as a facilitator. Please lead the Introduction, Wrap Up, and ensure the interview flows smoothly.`, {italic:false, after:120}));

  const agendaItems = [
    ['Introductions (5 min)', 'Get settled, introduce yourself, and explain the flow of the interview.'],
    ['Interview Questions', 'Ask questions assigned below to ensure consistency and eliminate potential for bias or duplicative questions. You may ask follow-up questions as needed.'],
    ['Wrap-Up & Questions (5–10 min)', 'Leave time at the end to answer candidate questions about the role, the team, or the company.'],
  ];
  agendaItems.forEach(([label, desc]) => {
    children.push(new Paragraph({
      children: [
        new TextRun({ text: '• ', font:'Arial', size:20, bold:true }),
        new TextRun({ text: label + ': ', font:'Arial', size:20, bold:true }),
        new TextRun({ text: desc, font:'Arial', size:20, italics:true })
      ],
      spacing: { before: 40, after: 60 },
      indent: { left: 360, hanging: 200 }
    }));
  });
  children.push(emptyPara());

  // Next Steps
  children.push(headerPara('Next Steps'));
  const nextSteps = [
    ['Prepare', 'Complete the Interview Note-Taking eLearning in Workday prior to conducting phone screens or interviews.'],
    ['Interview Feedback', 'Submit interview feedback in the Workday task that populates in your inbox within 24 hours.'],
    ['Attend Debrief', 'You may be invited to an interview debrief. If so, please attend and be prepared to talk through your interview feedback.'],
  ];
  nextSteps.forEach(([label, desc]) => {
    children.push(new Paragraph({
      children: [
        new TextRun({ text: '• ', font:'Arial', size:20, bold:true }),
        new TextRun({ text: label + ' →  ', font:'Arial', size:20, bold:true }),
        new TextRun({ text: desc, font:'Arial', size:20, italics:true })
      ],
      spacing: { before: 40, after: 60 },
      indent: { left: 360, hanging: 200 }
    }));
  });
  children.push(emptyPara());

  // Score Assignments
  children.push(headerPara('Score Assignments'));
  children.push(scoreTable);
  children.push(emptyPara());

  // Interview Questions
  children.push(headerPara('Interview Questions'));
  children.push(para(`Interviewer${isPanel ? 's' : ''}: ${interviewerLabel}`, {bold:true, size:20, after:120}));
  children.push(questionsTable);
  children.push(emptyPara());
  children.push(emptyPara());

  // Additional Notes
  children.push(headerPara('Additional Notes'));
  const notesTableRows = [
    new TableRow({ children: [
      cell([para('Strengths', {bold:true, size:18})], {shade:'F3F4F6', width:2400}),
      cell([para('', {size:18}), para('', {size:18})], {width:6960})
    ]}),
    new TableRow({ children: [
      cell([para('Opportunities', {bold:true, size:18})], {shade:'F3F4F6', width:2400}),
      cell([para('', {size:18}), para('', {size:18})], {width:6960})
    ]}),
    new TableRow({ children: [
      cell([para('General Notes', {bold:true, size:18})], {shade:'F3F4F6', width:2400}),
      cell([para('', {size:18}), para('', {size:18}), para('', {size:18})], {width:6960})
    ]})
  ];
  const notesTable = new Table({
    width: { size: 9360, type: WidthType.DXA },
    columnWidths: [2400, 6960],
    rows: notesTableRows
  });
  children.push(notesTable);

  // Build doc
  const doc = new Document({
    styles: {
      default: {
        document: { run: { font: 'Arial', size: 20 } }
      }
    },
    sections: [{
      properties: {
        page: {
          size: { width: 12240, height: 15840 },
          margin: { top: 1080, right: 1080, bottom: 1080, left: 1080 }
        }
      },
      headers: {
        default: new Header({ children: [
          new Paragraph({
            children: [
              new TextRun({ text: `Interview Guide – ${state.jobTitle}`, font:'Arial', size:18, color:'9CA3AF' }),
              new TextRun({ text: `\t${state.hiringManager}`, font:'Arial', size:18, color:'9CA3AF' })
            ],
            tabStops: [{ type: window.docx.TabStopType.RIGHT, position: window.docx.TabStopPosition.MAX }],
            spacing: { after: 0 },
            border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: 'E2E6EA', space: 2 } }
          })
        ]})
      },
      footers: {
        default: new Footer({ children: [
          new Paragraph({
            children: [
              new TextRun({ text: 'Confidential', font:'Arial', size:16, color:'9CA3AF', italics:true }),
              new TextRun({ children: ['\tPage ', PageNumber.CURRENT, ' of ', PageNumber.TOTAL_PAGES], font:'Arial', size:16, color:'9CA3AF' })
            ],
            tabStops: [{ type: window.docx.TabStopType.RIGHT, position: window.docx.TabStopPosition.MAX }],
            spacing: { before: 0 },
            border: { top: { style: BorderStyle.SINGLE, size: 4, color: 'E2E6EA', space: 2 } }
          })
        ]})
      },
      children
    }]
  });

  const blob = await Packer.toBlob(doc);
  const filename = `Interview Guide – ${state.jobTitle.replace(/[^a-zA-Z0-9 ]/g,'')}.docx`;
  saveAs(blob, filename);
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function attachEvents() {
  // Events are inline — nothing extra needed
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
